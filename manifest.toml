#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "fiduswriter"
name = "Fidus Writer"
description.en = "an online collaborative editor for academics"
description.fr = "un éditeur collaboratif en ligne pour les universitaires"

version = "4.0.18~ynh6"

maintainers = ["DeMiro5001"]

[upstream]
license = "GPL-3.0-only"
website = "https://fiduswriter.org/"
demo = "https://www.fiduswriter.com"
admindoc = "https://github.com/fiduswriter/fiduswriter/tree/develop/docs/installation"
userdoc = "https://github.com/fiduswriter/fiduswriter/blob/develop/docs/README.md"
code = "https://github.com/fiduswriter/fiduswriter"

fund = "https://www.fiduswriter.org/donate/"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = true

sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    help.en = "Admin password."
    help.fr = "Mot de passe de l'administrateur."
    type = "password"

    [install.is_free]
    ask.en = "This determines whether there is a star labeled **Free** on the login page?"
    type = "boolean"
    default = false

    [install.registration_open]
    ask.en = "Allow new user registration"
    type = "boolean"
    default = false

    [install.password_login]
    ask.en = "Enable password-based login"
    type = "boolean"
    default = true

    [install.socialaccount_open]
    ask.en = "Enable social account login"
    type = "boolean"
    default = false
    
[resources]
    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/fiduswriter/fiduswriter/archive/refs/tags/v4.0.18.tar.gz"
    sha256 = "7d666c7698bea05b892259c528e36e4c472987ae5234ccf86a6d0819ad50ad5e"
    in_subdir = true

    autoupdate.strategy = "latest_github_tag"

    [resources.sources.uv]
    amd64.url = "https://github.com/astral-sh/uv/releases/download/0.10.10/uv-x86_64-unknown-linux-gnu.tar.gz"
    amd64.sha256 = "3e1027f26ce8c7e4c32e2277a7fed2cb410f2f1f9320d3df97653d40e21f415b"
    arm64.url = "https://github.com/astral-sh/uv/releases/download/0.10.10/uv-aarch64-unknown-linux-gnu.tar.gz"
    arm64.sha256 = "2b80457b950deda12e8d5dc3b9b7494ac143eae47f1fb11b1c6e5a8495a6421e"
    armhf.url = "https://github.com/astral-sh/uv/releases/download/0.10.10/uv-armv7-unknown-linux-gnueabihf.tar.gz"
    armhf.sha256 = "032786622b52f8d0232b5ad16e25342a64f9e43576652db7bf607231021902f3"
    i386.url = "https://github.com/astral-sh/uv/releases/download/0.10.10/uv-i686-unknown-linux-gnu.tar.gz"
    i386.sha256 = "5260fbef838f8cfec44697064a5cfae08a27c6ab7ed7feab7fc946827e896952"
    
    in_subdir = true
    
    autoupdate.strategy = "latest_github_release"
    autoupdate.upstream = "https://github.com/astral-sh/uv"
    autoupdate.asset.amd64 = "^uv-x86_64-unknown-linux-gnu.tar.gz$"
    autoupdate.asset.arm64 = "^uv-aarch64-unknown-linux-gnu.tar.gz$"
    autoupdate.asset.armhf = "^uv-armv7-unknown-linux-gnueabihf.tar.gz$"
    autoupdate.asset.i386 = "^uv-i686-unknown-linux-gnu.tar.gz$"

    [resources.system_user]
    allow_email = true
    
    [resources.install_dir]

    [resources.data_dir]
    subdirs = ['media']

    [resources.permissions]
    main.url = "/"
    admin.url = "/admin"
    admin.allowed = "admins"
    admin.show_tile = false

    [resources.ports]

    [resources.apt]
    packages = "postgresql, postgresql-contrib, python3-pip, python3-venv, python3-dev, redis-server, libjpeg-dev, zlib1g-dev, gettext, libpq-dev, libldap2-dev, libsasl2-dev, rsync"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "24"
