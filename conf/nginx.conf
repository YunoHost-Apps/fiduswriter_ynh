    # Gunicorn proxy
    location / {

        proxy_pass http://unix:__INSTALL_DIR__/gunicorn.sock;
        
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_redirect off;
        proxy_set_header  X-Real-IP $remote_addr;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Host $server_name;
        proxy_set_header  X-Forwarded-Port $server_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Authorization $http_authorization;
    
        # Timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;

        client_max_body_size 10G;
    }

    # Static files
    location /static/ {
        alias __INSTALL_DIR__/static/;
        expires 1y;
        more_set_headers "Cache-Control: public, no-cache, proxy-revalidate";
        access_log off;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    }

    # Media files
    location /media/ {
        alias __DATA_DIR__/media/;
        expires 1y;
        access_log off;
        proxy_set_header Authorization $http_authorization;
        more_set_headers "Cache-Control: public, no-cache, proxy-revalidate";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ ^/(\.env|\.git|\.ht|README\.md|requirements\.txt|manage\.py) {
        deny all;
        access_log off;
        log_not_found off;
    }

location = /sw.js {
    alias __INSTALL_DIR__/static/js/sw.js;
    expires -1;
    access_log off;
    more_set_headers "Cache-Control: no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
}
